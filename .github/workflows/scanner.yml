name: CC Market Scanner v8.7

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 13 * * 1-5'
    - cron: '15 13 * * 1-5'
    - cron: '25 13 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '0,15,30,45 14-19 * * 1-5'
    - cron: '55 19 * * 1-5'
    - cron: '0,30 1 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '0,30 * * * *'

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Scan Cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/cc_cache.json
          key: cc-scanner-cache-v8.7
          restore-keys: |
            cc-scanner-cache-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v8.7
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy yfinance ta pytz

      - name: Run CC Scanner v8.7
        env:
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python cc_scanner_v8.7.py 2>&1 | tee scan.log

      - name: Save Scan Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/cc_cache.json
          key: cc-scanner-cache-v8.7

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: scan.log
          retention-days: 7
