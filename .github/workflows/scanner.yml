name: CC Market Scanner v8.0

on:
  schedule:
    # ── 盤前匯總視窗（ET = UTC-4 夏令 / UTC-5 冬令）────────────────────────
    # 以下用夏令時間（EDT, UTC-4）設定，冬令請自行 +1 小時

    # 開盤前30分鐘匯總：ET 09:00 = UTC 13:00
    - cron: '0 13 * * 1-5'

    # 開盤前15分鐘匯總：ET 09:15 = UTC 13:15
    - cron: '15 13 * * 1-5'

    # 開盤當下匯總：ET 09:30 = UTC 13:30
    - cron: '30 13 * * 1-5'

    # ── 盤中掃描（每15分鐘，ET 09:45 ~ 16:00）──────────────────────────────
    - cron: '45 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '15 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '15 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '45 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '15 16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '45 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '15 17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '45 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '15 18 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '45 18 * * 1-5'
    - cron: '0 19 * * 1-5'

    # 波段收盤前掃描：ET 15:55 = UTC 19:55（含 is_us_swing 視窗）
    - cron: '55 19 * * 1-5'

    # 台股開盤（台灣 09:00 = UTC 01:00）
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    # 台股收盤前波段（台灣 13:00 = UTC 05:00）
    - cron: '0 5 * * 1-5'

    # ── 加密半木夏（24/7，每30分鐘）────────────────────────────────────────
    - cron: '0 * * * *'
    - cron: '30 * * * *'

  # 手動觸發
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy yfinance ta pytz

      - name: Run CC Scanner v8.0
        env:
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python scanner.py

      - name: Upload scan log (保留7天)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
