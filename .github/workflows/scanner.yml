name: CC Market Scanner v9.5

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 放寬時間以應付 v9.5 的複雜運算

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Multi-Cache (Cooling + Forward Test)
        uses: actions/cache/restore@v4
        with:
          # 關鍵：同時緩存冷卻 JSON 和 交易日誌 JSON
          path: |
            /tmp/cc_cache.json
            /tmp/cc_forward_log.json
          key: cc-scanner-v9.5-data-${{ github.run_id }}
          restore-keys: |
            cc-scanner-v9.5-data-
            cc-scanner-cache-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install requests pandas numpy ta yfinance pytz

      - name: Run scanner
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ACCOUNT_BAL: ${{ secrets.ACCOUNT_BAL }}
          EXTRA_VCP: ${{ secrets.EXTRA_VCP }}
        # 確保你的 python 檔名是 scanner.py，或者改為你實際的檔名
        run: python scanner.py

      - name: Save Multi-Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            /tmp/cc_cache.json
            /tmp/cc_forward_log.json
          key: cc-scanner-v9.5-data-${{ github.run_id }}
